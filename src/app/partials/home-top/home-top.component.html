<header class="ax-home-top">
  <div class="ax-home-top-inner">
    <a routerLink="/" class="ax-home-top-brand" aria-label="Abayti home">
      <img src="assets/img/abayti.png" [alt]="'brand_alt' | translate" class="ax-home-top-logo" />
    </a>

    <button
      type="button"
      class="ax-home-top-toggle"
      (click)="menuOpen = !menuOpen"
      [attr.aria-expanded]="menuOpen"
      aria-controls="ax-home-top-menu"
      [attr.aria-label]="menuOpen ? 'Close menu' : 'Open menu'"
    >
      <span class="material-symbols-outlined" aria-hidden="true">{{ menuOpen ? 'close' : 'menu' }}</span>
    </button>

    <nav
      id="ax-home-top-menu"
      class="ax-home-top-nav"
      [class.ax-home-top-nav-open]="menuOpen"
      aria-label="Primary"
    >
      <ul class="ax-home-top-links">
        <li><a href="#home"     class="ax-home-top-link" (click)="menuOpen = false">{{ 'nav_home' | translate }}</a></li>
        <li><a href="#features" class="ax-home-top-link" (click)="menuOpen = false">{{ 'nav_features' | translate }}</a></li>
        <li><a href="#how"      class="ax-home-top-link" (click)="menuOpen = false">{{ 'nav_how_it_works' | translate }}</a></li>
        <li><a href="#pricing"  class="ax-home-top-link" (click)="menuOpen = false">{{ 'nav_pricing' | translate }}</a></li>
        <li><a href="#faq"      class="ax-home-top-link" (click)="menuOpen = false">{{ 'nav_faq' | translate }}</a></li>
      </ul>

      <div class="ax-home-top-actions">
        <app-language-switcher></app-language-switcher>
        <a routerLink="/login" class="ax-btn ax-btn-outline ax-btn-sm" (click)="menuOpen = false">
          {{ 'login_button' | translate }}
        </a>
        <a routerLink="/register" class="ax-btn ax-btn-primary ax-btn-sm" (click)="menuOpen = false">
          {{ 'register_free' | translate }}
        </a>
      </div>
    </nav>
  </div>
</header>
