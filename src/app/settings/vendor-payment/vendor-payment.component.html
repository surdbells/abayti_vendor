<app-side></app-side>
<app-top></app-top>
<main class="main ml-desktop-22rem px-lg-6">
  <!-- Content -->
  <div class="container-lg">
    <!-- Page header -->
    <!-- Page header -->
    <div class="row align-items-center mb-7">
      <div (click)="goBack()" role="button" class="col-auto">
        <div class="avatar text-center avatar-md rounded text-primary-emphasis">
          <i class="fs-5">
            <tui-icon icon="@tui.chevron-left" />
          </i>
        </div>
      </div>
      <div class="col">
        <h1 class="fs-4 mb-0">Payment information</h1>
      </div>
      <div class="col-12 col-sm-auto mt-4 mt-sm-0">
        <!--        <a class="btn btn-secondary d-block">
                  <span class="material-symbols-outlined me-1"> add </span> New
                </a>-->
      </div>
    </div>

    <!-- Page content -->
    <div class="row">
      <div class="col-12 col-lg-9" data-bs-spy="scroll" data-bs-target="#accountNav" data-bs-smooth-scroll="true" tabindex="0">
        <section  *ngIf="!ui_controls.is_loading" class="card card-line bg-body-tertiary border-transparent mb-5" id="password">
          <div class="card-body">
            <h2 class="fs-5 mb-1">Bank Transfer</h2>
            <p class="text-body-secondary">Please provide your bank details to receive payouts.</p>
            <div class="card border-transparent">
              <div class="card-body">
                <div class="mb-4">
                  <label class="form-label">Bank name</label>
                  <input [(ngModel)]="store_single.store_bank_name" type="text" name="store_bank_name" class="form-control">
                </div>
                <div class="mb-4">
                  <label class="form-label">Account name</label>
                  <input [(ngModel)]="store_single.store_account_name" type="text" name="store_account_name" class="form-control">
                </div>
                <div class="mb-4">
                  <label class="form-label">Account Number / IBAN</label>
                  <input [(ngModel)]="store_single.store_account_number" type="text" name="store_account_number" class="form-control">
                </div>
              </div>
            </div>
          </div>
          <div class="card-footer">
            <button (click)="save_change()" class="btn btn-secondary text-white" type="button">Save Changes</button>
          </div>
        </section>
        <tui-loader *ngIf="ui_controls.is_loading" />
      </div>
    </div>
  </div>
</main>
