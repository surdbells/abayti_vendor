<!-- Dual shell: vendor gets side nav, admin gets aside + admin-top -->
<app-vendor-shell *ngIf="user_session.is_vendor">
  <ng-container *ngTemplateOutlet="securityContent"></ng-container>
</app-vendor-shell>

<app-admin-shell *ngIf="user_session.is_admin">
  <ng-container *ngTemplateOutlet="securityContent"></ng-container>
</app-admin-shell>

<ng-template #securityContent>
  <div class="ax-container">
    <header class="ax-page-header">
      <div class="ax-page-header-content">
        <button
          type="button"
          (click)="goBack()"
          class="ax-btn ax-btn-ghost ax-btn-sm ax-mb-2"
          style="align-self: flex-start;">
          <span class="material-symbols-outlined" aria-hidden="true">arrow_back</span>
          Back
        </button>
        <span class="ax-page-header-eyebrow">Account</span>
        <h1 class="ax-page-title">{{ 'security_title' | translate }}</h1>
      </div>
    </header>

    <section class="ax-page-section">
      <!-- Two-factor authentication -->
      <div class="ax-card ax-p-5 ax-mb-4" style="max-width: 48rem;">
        <h2 class="ax-h5 ax-m-0 ax-mb-1">{{ 'security_2fa_title' | translate }}</h2>
        <p class="ax-text-sm ax-text-secondary ax-m-0 ax-mb-4">{{ 'security_2fa_subtext' | translate }}</p>

        <div class="ax-flex ax-items-center ax-justify-between ax-gap-3 ax-flex-wrap">
          <div style="flex: 1; min-width: 14rem;">
            <div class="ax-font-medium ax-text-primary">{{ 'security_2fa_locked' | translate }}</div>
          </div>

          <label class="ax-switch">
            <input type="checkbox" checked disabled />
            <span class="ax-switch-track"></span>
            <span class="ax-switch-label">{{ 'security_2fa_enable' | translate }}</span>
          </label>

          <button type="button" class="ax-btn ax-btn-outline ax-btn-sm" disabled>
            {{ 'save_changes' | translate }}
          </button>
        </div>
      </div>

      <!-- Change password -->
      <div class="ax-card ax-p-5" style="max-width: 48rem;">
        <h2 class="ax-h5 ax-m-0 ax-mb-1">{{ 'security_change_password_title' | translate }}</h2>
        <p class="ax-text-sm ax-text-secondary ax-m-0 ax-mb-4">{{ 'security_change_password_subtext' | translate }}</p>

        <div class="ax-form-field ax-mb-3">
          <label class="ax-label" for="password">{{ 'password_label' | translate }}</label>
          <input
            id="password"
            type="password"
            class="ax-input"
            autocomplete="new-password"
            name="password"
            [(ngModel)]="update_password.password" />
        </div>

        <div class="ax-form-field ax-mb-4">
          <label class="ax-label" for="confirm_password">{{ 'password_confirm_label' | translate }}</label>
          <input
            id="confirm_password"
            type="password"
            class="ax-input"
            autocomplete="new-password"
            name="confirm_password"
            [(ngModel)]="update_password.confirm_password" />
        </div>

        <div class="ax-flex ax-justify-end">
          <button
            type="button"
            class="ax-btn ax-btn-primary"
            (click)="password_change()"
            [disabled]="ui_controls.is_saving">
            <span *ngIf="ui_controls.is_saving" class="ax-spinner ax-spinner-sm" aria-hidden="true"></span>
            <span *ngIf="!ui_controls.is_saving" class="material-symbols-outlined" aria-hidden="true">save</span>
            {{ 'save_changes' | translate }}
          </button>
        </div>
      </div>
    </section>
  </div>
</ng-template>
