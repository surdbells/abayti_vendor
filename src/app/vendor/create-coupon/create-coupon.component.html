<app-side></app-side>
<app-top></app-top>
<main class="main ml-desktop-22rem px-lg-6">
  <div class="container-lg">
    <!-- Page header -->
    <div class="row align-items-center mb-7">
      <div (click)="goBack()" role="button" class="col-auto">
        <div class="avatar text-center avatar-md rounded text-primary-emphasis">
          <i class="fs-5">
            <tui-icon icon="@tui.chevron-left" />
          </i>
        </div>
      </div>
      <div class="col">
        <h1 class="fs-4 mb-0">Create coupons</h1>
      </div>
      <div class="col-12 col-sm-auto mt-4 mt-sm-0">
        <a (click)="createCoupon()" class="btn btn-secondary d-block">
          <span class="material-symbols-outlined me-1"> add </span> New Coupon
        </a>
      </div>
    </div>
    <div class="row">
      <div class="col-md-9">
        <div class="card">
          <div class="card-body">
            <div class="mb-3 position-relative">
              <label class="form-label">Create coupon code</label>
              <div class="input-group input-group-flat">
                <input type="text" class="form-control coupon-code-input" name="code">
                <span class="input-group-text">
                  <a href="javascript:void(0)" class="input-group-link">Generate coupon code</a>
                </span>
              </div>
              <small class="form-hint">Customers will enter this coupon code when they checkout. </small>
            </div>
            <div class="mb-3 position-relative">
              <input type="text" class="form-control" name="title" placeholder="Enter coupon name"></div>
            <div class="mb-3 position-relative">
              <label class="form-check">
                <input class="form-check-input" type="checkbox" name="is_unlimited" value="1">
                <span class="form-check-label">Unlimited coupon?</span>
              </label>
            </div>
            <div class="mb-3 position-relative">
              <label class="form-check"><input class="form-check-input" type="checkbox" name="can_use_with_flash_sale" value="1">
                <span class="form-check-label">Can be used with flash sale?</span>
                <span class="form-check-description">Allows customers to apply the coupon to items already on flash sale, enabling combined discounts.</span>
              </label>
            </div>
            <div class="mb-3 position-relative" style="display: none;">
              <label class="form-label">Enter number</label>
              <input type="text" class="form-control" name="quantity" autocomplete="off" disabled="">
            </div>
            <div class="border-top"><h4 class="mt-3 mb-2">Coupon type</h4>
              <div class="row">
                <div class="col-md-4 mb-3">
                  <select id="discount-type-option" name="type_option" class="form-select" aria-invalid="false" aria-describedby="discount-type-option-error">
                    <option value="amount">Amount - Fixed</option>
                    <option value="percentage">Discount %</option>
                  </select>
                </div>
                <div class="col-md-4 mb-3">
                  <div class="input-group input-group-flat"><span class="input-group-text">Discount</span>
                    <input type="number" class="form-control" name="value" autocomplete="off" placeholder="0">
                    <span class="input-group-text">$</span></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card mb-3">
          <div class="card-header"><h4 class="card-title">Time</h4></div>
          <div class="card-body">
            <div class="mb-3 position-relative"><label class="form-label">Start date</label>
              <div class="d-flex">
                <div class="input-icon datepicker">
                  <input type="text" placeholder="Y-m-d" data-date-format="Y-m-d" name="start_date" class="form-control rounded-end-0 flatpickr-input is-valid" readonly="readonly" data-input="" aria-invalid="false" aria-describedby="start_date-error">
                  <div id="start_date-error" class="invalid-feedback" style="display: block;"></div>
                  <span class="input-icon-addon">
                    <i class="ti ti-calendar"></i>
                  </span>
                </div>
                <div class="input-icon">
                  <input type="text" placeholder="hh:mm" name="start_time" class="form-control rounded-start-0 timepicker timepicker-24 is-valid" aria-invalid="false">
                  <span class="input-icon-addon"><i class="icon ti ti-clock"></i></span>
                </div>
              </div>
            </div>
            <div class="mb-3 position-relative"><label class="form-label">End date</label>
              <div class="d-flex">
                <div class="input-icon datepicker">
                  <input type="text" placeholder="Y-m-d" data-date-format="Y-m-d" name="end_date" class="form-control rounded-end-0 flatpickr-input" data-input="">
                  <span class="input-icon-addon">
                    <i class="ti ti-calendar"></i>
                  </span>
                </div>
                <div class="input-icon">
                  <input type="text" placeholder="hh:mm" name="end_time" class="form-control rounded-start-0 timepicker timepicker-24" disabled="">
                  <span class="input-icon-addon"><i class="icon ti ti-clock"></i></span>
                </div>
              </div>
            </div>
            <div class="position-relative">
              <label class="form-check">
                <input class="form-check-input" type="checkbox" name="unlimited_time" value="1">
                <span class="form-check-label">Never expired?</span>
              </label>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="card-body">
            <div class="btn-list">
              <button type="submit" class="btn btn-primary">Save</button>
              <a class="btn me-2" routerLink="/coupons">Cancel</a></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>
