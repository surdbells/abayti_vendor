<style>
  /* keep the image filling its card without distortion */
  .object-fit-cover { object-fit: cover; }
</style>

<div style="max-width: 55rem; padding-top: 3%" class="container animate__animated animate__fadeIn">
    <span class="badge abayti_secondary_background rounded-pill mb-3">
    <a routerLink="/" class="btn px-1 py-0 btn-sm text-white">{{ 'back_to_website' | translate }}</a>
  </span>
  <div  class="row justify-content-center align-items-stretch g-4">
    <div class="col-12 col-lg-6 d-none d-md-flex">
      <div class="card shadow-lg w-100 h-100 overflow-hidden">
        <img src="assets/img/e572a033-31e5-4b38-991f-44578a2125a8.jpeg" alt="home" class="w-100 h-100 object-fit-cover animate__animated animate__fadeIn"
        />
      </div>
    </div>
    <div class="col-12 col-lg-6 d-flex">
      <div class="card">
        <div class="card-header text-center">
          <div class="row align-items-center">
            <div class="col-6 text-start">
              <img class="img-fluid" style="max-width: 140px" src="assets/img/abayti.png" alt="abayti" />
            </div>
            <div class="col-6 text-end">
              <app-language-switcher></app-language-switcher>
            </div>
          </div>
        </div>
        <div *ngIf="!ui_controls.registered" class="card-body">
          <h1 class="fs-2">{{ 'register' | translate }}</h1>
          <p class="lead text-body-secondary">{{'create_account' | translate}}</p>
          <form (ngSubmit)="user_register()"  method="post"  class="mb-5">
            <div class="row">
              <div class="col-xxl-6 col-xl-6 col-lg-6 col-md-6 col-12">
                <div class="mb-2">
                  <label for="first_name" class="required">{{ 'first_name' | translate }}</label>
                  <input [(ngModel)]="register.first_name" name="first_name" class="form-control form-control-sm" id="first_name" type="text" />
                </div>
              </div>
              <div class="col-xxl-6 col-xl-6 col-lg-6 col-md-6 col-12">
                <div class="mb-2">
                  <label for="last_name" class="required">{{ 'last_name' | translate }}</label>
                  <input [(ngModel)]="register.last_name" name="last_name" class="form-control form-control-sm" id="last_name" type="text" />
                </div>
              </div>
            </div>
            <div class="mb-2">
              <label for="email" class="required">{{ 'email' | translate }}</label>
              <input [(ngModel)]="register.email" name="email" class="form-control form-control-sm" id="email" type="email" />
            </div>
            <div class="row">
              <div class="col-xxl-6 col-xl-6 col-lg-6 col-md-6 col-12">
                <div class="mb-2">
                  <label>{{ 'business_name' | translate }}</label>
                  <input class="form-control form-control-sm" name="business_name" id="business_name" [(ngModel)]="register.business_name"  type="text" value=""/>
                </div>
              </div>
              <div class="col-xxl-6 col-xl-6 col-lg-6 col-md-6 col-12">
                <div class="mb-2">
                  <label>{{ 'license_number' | translate }}</label>
                  <input class="form-control form-control-sm" name="license_number" id="license_number" [(ngModel)]="register.license_number"  type="text" value=""/>
                </div>
              </div>
              <div class="col-12">
                <small class="form-text">{{'add_business_lic_instruction' | translate}}</small>
              </div>
            </div>
            <div class="mb-2">
              <label class="required">{{ 'phone_number' | translate }}</label>
              <div class="input-group">
                <div class="btn-group" data-bs-auto-close="outside">
                  <button class="btn abayti_secondary_background text-white btn-outline-secondary btn-sm dropdown-toggle d-flex align-items-center" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                    <span class="me-1">{{ selectedDial?.flag }}</span>{{ register.countryCode }}
                  </button>
                  <div class="dropdown-menu p-2" style="min-width: 18rem;">
                    <input type="search" name="search"  class="form-control form-control-sm mb-2" placeholder="Search by country or code" [(ngModel)]="codeSearch" (click)="$event.stopPropagation()" />
                    <div class="list-group list-group-flush code-list">
                      <button type="button" class="list-group-item list-group-item-action py-1" *ngFor="let c of filteredDialCodes()" (click)="selectCode(c)">
                        <span class="me-1">{{ c.flag }}</span>{{ c.name }}
                        <span class="text-muted small">({{ c.code }})</span>
                      </button>
                    </div>
                  </div>
                </div>
                <input [(ngModel)]="register.phone" name="phone" class="form-control form-control-sm" type="tel" inputmode="numeric" pattern="\\d*" placeholder="5XXXXXXXX" />
              </div>
            </div>
            <div class="row">
              <div class="col-xxl-6 col-xl-6 col-lg-6 col-md-6 col-12">
                <div class="mb-4">
                  <label for="password" class="required">{{ 'password' | translate }}</label>
                  <input [type]="fieldTextType ? 'text' : 'password'" class="form-control form-control-sm" name="password" id="password" [(ngModel)]="register.password"  type="password" value=""/>
                </div>
              </div>
              <div class="col-xxl-6 col-xl-6 col-lg-6 col-md-6 col-12">
                <div class="mb-4">
                  <label for="password" class="required">{{ 'confirm_password' | translate }}</label>
                  <input [type]="fieldTextType ? 'text' : 'password'" class="form-control form-control-sm" name="confirm_password" id="confirm_password" [(ngModel)]="register.confirm_password"  type="password" value=""/>
                </div>
              </div>
            </div>
            <tui-loader *ngIf="ui_controls.loading" />
            <button *ngIf="!ui_controls.loading" class="btn text-white fw-bold abayti_secondary_background btn-secondary w-100" type="submit">
              {{'register' | translate}}
            </button>
          </form>
          <p class="text-center text-body-secondary mb-0">{{ 'have_account' | translate }}
            <a class="text-black" routerLink="/login">{{'sign_in' | translate }}</a>
          </p>
        </div>
        <div class="card-footer">
          <p class="text-center text-body-secondary mb-0">{{ 'forgot_password_message' | translate }}
            <a class="text-black" routerLink="/reset"> {{ 'reset_password' | translate }} </a>
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
